# Optional: only needed if you want to use PostgreSQL instead of the default SQLite.
# For normal use, just run ./start.sh — no Docker required.
version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: assetmgmt_postgres
    environment:
      POSTGRES_DB: assetmgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
